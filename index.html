<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background: #007bff;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
        h1 {
            margin: 0;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }
        footer {
            text-align: center;
            padding: 20px 0;
            background: #333;
            color: white;
            position: absolute;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Landing Page</h1>
    </header>
    <div class="container">
        <h2>Your One-Stop Solution</h2>
        <p>This is a simple landing page template for you to start building your own landing page.</p>
        <button id="cta-button">Learn More</button>
    </div>
    <footer>
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById('cta-button').addEventListener('click', function() {
            alert('You clicked the button!');
        });
    </script>
</body>
</html>
